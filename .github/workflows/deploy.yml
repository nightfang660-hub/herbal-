name: Build and Deploy to GCP

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - 'terraform/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation authentication

jobs:
  # --- Phase 1: Test & Validate ---
  validate:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradlew Executable
        run: chmod +x backend/gradlew

      - name: Run Unit & Integration Tests
        run: |
          cd backend
          ./gradlew clean test --no-daemon

      - name: Run Trivy Security Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

  # --- Phase 2: Setup Environment Outputs ---
  setup:
    name: Setup Environment Variables
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.set-vars.outputs.env_name }}
      project_id: ${{ steps.set-vars.outputs.project_id }}
      wif_provider: ${{ steps.set-vars.outputs.wif_provider }}
      wif_sa: ${{ steps.set-vars.outputs.wif_sa }}
    steps:
      - id: set-vars
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
            echo "project_id=${{ secrets.GCP_PROJECT_ID_PROD }}" >> $GITHUB_OUTPUT
            echo "wif_provider=${{ secrets.WIF_PROVIDER_PROD }}" >> $GITHUB_OUTPUT
            echo "wif_sa=${{ secrets.WIF_SERVICE_ACCOUNT_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "env_name=dev" >> $GITHUB_OUTPUT
            echo "project_id=${{ secrets.GCP_PROJECT_ID_DEV }}" >> $GITHUB_OUTPUT
            echo "wif_provider=${{ secrets.WIF_PROVIDER_DEV }}" >> $GITHUB_OUTPUT
            echo "wif_sa=${{ secrets.WIF_SERVICE_ACCOUNT_DEV }}" >> $GITHUB_OUTPUT
          fi

  # --- Phase 3: Terraform Lint & Plan ---
  terraform:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest
    needs: [validate, setup]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Authenticate with GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ needs.setup.outputs.wif_provider }}
          service_account: ${{ needs.setup.outputs.wif_sa }}

      - name: Terraform Format & Init
        run: |
          cd terraform
          terraform fmt -check
          terraform init -backend-config="bucket=herbaltea-tf-state-${{ needs.setup.outputs.env_name }}"

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan -var="project_id=${{ needs.setup.outputs.project_id }}" -var="environment=${{ needs.setup.outputs.env_name }}" -out=tfplan

  # --- Phase 4: Build & Deploy Application & Infrastructure ---
  deploy:
    name: Deploy to Cloud Run & Apply Terraform
    runs-on: ubuntu-latest
    needs: [validate, setup, terraform]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Authenticate with GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ needs.setup.outputs.wif_provider }}
          service_account: ${{ needs.setup.outputs.wif_sa }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          ENV_NAME=${{ needs.setup.outputs.env_name }}
          PROJECT_ID=${{ needs.setup.outputs.project_id }}
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/herbaltea/$ENV_NAME-backend:$IMAGE_TAG -t us-central1-docker.pkg.dev/$PROJECT_ID/herbaltea/$ENV_NAME-backend:latest ./backend
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/herbaltea/$ENV_NAME-backend:$IMAGE_TAG
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/herbaltea/$ENV_NAME-backend:latest

      - name: Run Terraform Apply
        run: |
          cd terraform
          terraform init -backend-config="bucket=herbaltea-tf-state-${{ needs.setup.outputs.env_name }}"
          terraform apply -var="project_id=${{ needs.setup.outputs.project_id }}" -var="environment=${{ needs.setup.outputs.env_name }}" -auto-approve

      # Automatic Rollback Action on Failure
      - name: Rollback Cloud Run Service on Deployment Failure
        if: failure()
        run: |
          echo "Deployment failed! Rolling back Cloud Run service..."
          gcloud run services update ${{ needs.setup.outputs.env_name }}-platform-service \
            --region=us-central1 \
            --rollback-to-stable-revision
